<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PNHL | Administration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Aptos:wght@400;700&display=swap');
        :root { --pnhl: #fc723f; }
        * { font-family: 'Aptos', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: #f4f4f4; padding: 20px; }
        .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--pnhl); padding-bottom: 15px; margin-bottom: 20px; }
        .status { font-size: 0.8rem; padding: 5px 12px; border-radius: 4px; font-weight: bold; }
        .online { background: #e6ffed; color: #28a745; }
        .offline { background: #fff1f0; color: #cf1322; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #fafafa; border-bottom: 1px solid #ddd; font-size: 0.8rem; color: #666; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .team-logo { width: 22px; height: 22px; vertical-align: middle; margin-right: 10px; }
        .loading { text-align: center; padding: 50px; color: var(--pnhl); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1 style="margin:0;">PNHL <span style="font-weight:normal; color:#999;">| Admin</span></h1>
        <div id="apiStatus" class="status offline">Connexion...</div>
    </div>

    <input type="text" id="search" placeholder="Filtrer par nom ou équipe..." style="width:100%; padding:12px; border:1px solid #ddd; border-radius:5px; margin-bottom:20px;" onkeyup="filter()">

    <div id="tableContainer">
        <div class="loading">Chargement des stats NHL via relais sécurisé...</div>
    </div>
</div>

<script>
    let allPlayers = [];

    async function loadNHL() {
        const container = document.getElementById('tableContainer');
        const status = document.getElementById('apiStatus');
        const target = "https://api-web.nhle.com/v1/skater-stats-now";
        
        // Utilisation du mode 'contents' de AllOrigins qui est le plus robuste pour GitHub
        try {
            const resp = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
            const data = await resp.json();
            
            // data.contents contient le JSON sous forme de texte brut
            const cleanData = JSON.parse(data.contents);
            allPlayers = cleanData.data;

            // Tri par points
            allPlayers.sort((a,b) => b.points - a.points);
            
            status.textContent = "● NHL CONNECTÉE";
            status.className = "status online";
            render(allPlayers.slice(0, 100));

        } catch (err) {
            status.textContent = "○ ÉCHEC CONNEXION";
            status.className = "status offline";
            container.innerHTML = `<div style="text-align:center; padding:20px; color:red;">
                <b>Erreur Critique :</b> GitHub bloque l'accès.<br>
                <button onclick="location.reload()" style="margin-top:10px; cursor:pointer; padding:8px 15px;">Réessayer</button>
            </div>`;
        }
    }

    function render(list) {
        let html = `<table><tr><th>Joueur</th><th>Équipe</th><th>PJ</th><th>B</th><th>A</th><th style="text-align:center">PTS</th></tr>`;
        list.forEach(p => {
            html += `<tr>
                <td><img class="team-logo" src="https://assets.nhle.com/mktg/utils/logos/teams-dark/${p.teamAbbrev}.svg" onerror="this.style.opacity='0'"><b>${p.firstName} ${p.lastName}</b></td>
                <td>${p.teamAbbrev}</td>
                <td>${p.gamesPlayed}</td>
                <td>${p.goals}</td>
                <td>${p.assists}</td>
                <td style="text-align:center; font-weight:bold; color:var(--pnhl)">${p.points}</td>
            </tr>`;
        });
        document.getElementById('tableContainer').innerHTML = html + "</table>";
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const f = allPlayers.filter(p => `${p.firstName} ${p.lastName} ${p.teamAbbrev}`.toLowerCase().includes(q));
        render(f.slice(0, 100));
    }

    window.onload = loadNHL;
</script>

</body>
</html>
