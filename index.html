<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PNHL - Joueurs NHL</title>
<style>
body{font-family:sans-serif;margin:20px;}
input.search-bar{width:100%;padding:8px;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:6px;text-align:left;}
.stats{text-align:center;}
</style>
</head>
<body>

<h2>PNHL - Joueurs NHL</h2>
<input class="search-bar" placeholder="Rechercher joueur..." onkeyup="search(this.value)">
<div id="content">Chargement...</div>

<script>
let allPlayers = [];

async function loadPlayers() {
    const content = document.getElementById("content");
    content.innerHTML = "Chargement des joueurs depuis Marqueur.com...";

    try {
        // Proxy pour contourner CORS
        const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://www.marqueur.com/hockey/stats/nhl/stats.php");
        const res = await fetch(url);
        const text = await res.text();

        // Parser HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/html");

        // Tableau de joueurs
        const tables = doc.querySelectorAll("table.statsTable"); // la classe du tableau peut changer
        let players = [];

        tables.forEach(table => {
            const rows = table.querySelectorAll("tr");
            rows.forEach((row, idx) => {
                if(idx===0) return; // skip header
                const cols = row.querySelectorAll("td");
                if(cols.length<5) return; // skip malformed

                // Extraction des valeurs
                const lastName = cols[0].textContent.trim();
                const firstName = cols[1].textContent.trim();
                const position = cols[2].textContent.trim();
                const games = cols[3].textContent.trim();
                const points = cols[4].textContent.trim();

                players.push({
                    firstName,
                    lastName,
                    positionCode: position,
                    gamesPlayed: games,
                    points,
                    teamAbbrev: "" // pas disponible dans ce tableau
                });
            });
        });

        // tri par points décroissant
        players.sort((a,b) => parseFloat(b.points)-parseFloat(a.points));

        allPlayers = players;
        render(allPlayers);

    } catch(e) {
        content.innerHTML = "Erreur chargement Marqueur.com";
        console.error(e);
    }
}

function render(list) {
    const content = document.getElementById("content");
    let html = `<table>
    <tr>
        <th>Nom</th><th>Prénom</th><th>Pos</th><th class="stats">PJ</th><th class="stats">PTS</th>
    </tr>`;
    list.forEach(p=>{
        html+=`<tr>
            <td>${p.lastName}</td>
            <td>${p.firstName}</td>
            <td>${p.positionCode}</td>
            <td class="stats">${p.gamesPlayed}</td>
            <td class="stats">${p.points}</td>
        </tr>`;
    });
    html += "</table>";
    content.innerHTML = html;
}

function search(val){
    val = val.toLowerCase();
    const filtered = allPlayers.filter(p => (p.firstName+" "+p.lastName).toLowerCase().includes(val));
    render(filtered);
}

// Charger automatiquement
loadPlayers();
</script>

</body>
</html>
