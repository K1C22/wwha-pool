<script>
    async function loadStats(type) {
        const container = document.getElementById('tableContainer');
        container.innerHTML = "Chargement via Vercel + Marqueur...";

        try {
            // REMPLACE PAR TON URL VERCEL
            const response = await fetch(`https://TON-PROJET-VERCEL.vercel.app/api?type=${type}`);
            const players = await response.json();

            let html = `<table><tr><th>Rang</th><th>Joueur</th><th>Équipe</th><th>PTS</th></tr>`;
            
            players.forEach(p => {
                html += `<tr>
                    <td>${p.rank}</td>
                    <td><b>${p.name}</b></td>
                    <td>${p.team}</td>
                    <td style="color:#fc723f; font-weight:bold;">${p.pts}</td>
                </tr>`;
            });
            
            container.innerHTML = html + "</table>";
        } catch (err) {
            container.innerHTML = "<div style='color:red;'>Erreur : Le JSON de Vercel est malformé.</div>";
        }
    }
</script>
