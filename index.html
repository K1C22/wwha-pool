<style>

/* Charger la police Aptos Italic */
@font-face {
    font-family: 'Aptos';
    src: url('Aptos-Italic.woff2') format('woff2'),
         url('Aptos-Italic.woff') format('woff'),
         url('Aptos-Italic.ttf') format('truetype');
    font-style: italic;
    font-weight: normal;
}

body{
    font-family: 'Aptos', Arial, Helvetica, sans-serif;
    font-style: italic;
    background:#efefef;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
}

.login-container{
    background:white;
    padding:40px;
    width:360px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
}

.logo{
    width:150px;
    margin:auto;
    margin-bottom:25px;
    opacity:0.35;
}

label{
    font-size:12px;
    letter-spacing:1px;
    margin-top:10px;
    margin-bottom:6px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:2px solid #222;
    font-size:14px;
    box-sizing:border-box;
}

.password-field{
    position:relative;
}

.eye{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    opacity:0.6;
}

.remember{
    margin-top:15px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
}

.login-btn{
    margin-top:20px;
    background:#1f5cc4;
    color:white;
    border:none;
    padding:14px;
    border-radius:8px;
    font-weight:bold;
    letter-spacing:1px;
    cursor:pointer;
}

.login-btn:hover{
    background:#17479a;
}

.forgot{
    text-align:center;
    margin-top:20px;
    font-size:14px;
    color:#666;
    cursor:pointer;
}

</style>
