<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PNHL</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Aptos:ital,wght@0,400;1,400&display=swap');

*{font-family:'Aptos',sans-serif;box-sizing:border-box;}

body{margin:0;background:#fff;color:#333;}

#loginPage{
display:flex;align-items:center;justify-content:center;
height:100vh;background:#f5f5f5;
}

.login-container{
background:#fff;padding:30px;width:380px;border-radius:4px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
display:flex;flex-direction:column;align-items:center;
}

.logo{width:220px;margin-bottom:40px;}

input{
width:100%;padding:12px;border-radius:4px;
border:1px solid #ddd;margin-bottom:20px;font-size:11pt;
}

button{
background:#fc723f;color:#fff;border:none;
width:100%;padding:12px;border-radius:4px;
cursor:pointer;font-weight:bold;
}

#app{display:none;}

.header{
padding:15px 30px;border-bottom:1px solid #eee;
display:flex;justify-content:space-between;
}

.navbar{
display:flex;gap:5px;padding:10px;
background:#f8f8f8;justify-content:center;
}

.navbar div{
padding:10px;cursor:pointer;font-weight:bold;
}

.content{padding:20px;}

.search-bar{
width:100%;padding:10px;margin-bottom:10px;
border:1px solid #ddd;
}

table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #eee;}

.stats{text-align:center;}
</style>
</head>

<body>

<div id="loginPage">
<div class="login-container">
<img src="https://raw.githubusercontent.com/K1C22/wwha-pool/main/WWHA13b.png" class="logo">
<input type="text" id="usernameInput" placeholder="Identifiant">
<input type="password" id="passwordInput" placeholder="Mot de passe">
<button onclick="login()">CONNEXION</button>
</div>
</div>

<div id="app">

<div class="header">
<h2>PNHL</h2>
<button onclick="logout()">Déconnexion</button>
</div>

<div class="navbar">
<div onclick="loadPlayers()">JOUEURS NHL</div>
</div>

<div class="content" id="content"></div>

</div>

<script>

let allPlayers = [];

function login(){
const u = document.getElementById("usernameInput").value;
if(!u){alert("Entrer un identifiant");return;}
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";
}

function logout(){
location.reload();
}

async function loadPlayers(){
const c = document.getElementById("content");
c.innerHTML="Chargement...";

try{

const [skatersRes, goaliesRes] = await Promise.all([
fetch("https://api-web.nhle.com/v1/skater-stats-now"),
fetch("https://api-web.nhle.com/v1/goalie-stats-now")
]);

const skaters = await skatersRes.json();
const goalies = await goaliesRes.json();

allPlayers = [...skaters.data, ...goalies.data];

// tri
allPlayers.sort((a,b)=>{
const A = a.points ?? a.wins ?? 0;
const B = b.points ?? b.wins ?? 0;
return B-A;
});

render(allPlayers);

c.insertAdjacentHTML("afterbegin",`
<input class="search-bar" placeholder="Rechercher joueur..." onkeyup="search(this.value)">
`);

}catch(e){
c.innerHTML="Erreur API NHL";
}
}

function render(list){

let html=`
<table>
<tr>
<th>Joueur</th>
<th>Pos</th>
<th class="stats">PJ</th>
<th class="stats">B</th>
<th class="stats">A</th>
<th class="stats">PTS/V</th>
</tr>
`;

list.slice(0,150).forEach(p=>{

const pts = p.points ?? p.wins ?? "-";

html+=`
<tr>
<td>
<img src="https://assets.nhle.com/mktg/utils/logos/teams-dark/${p.teamAbbrev}.svg" width="20" onerror="this.style.display='none'">
${p.firstName} ${p.lastName}
</td>
<td>${p.positionCode ?? "G"}</td>
<td class="stats">${p.gamesPlayed ?? "-"}</td>
<td class="stats">${p.goals ?? "-"}</td>
<td class="stats">${p.assists ?? "-"}</td>
<td class="stats" style="color:#fc723f;font-weight:bold">${pts}</td>
</tr>
`;

});

html+="</table>";

document.getElementById("content").innerHTML+=html;
}

function search(val){

val=val.toLowerCase();

const filtered = allPlayers.filter(p=>
(p.firstName+" "+p.lastName).toLowerCase().includes(val)
);

document.getElementById("content").innerHTML="";
render(filtered);

document.getElementById("content").insertAdjacentHTML("afterbegin",`
<input class="search-bar" value="${val}" onkeyup="search(this.value)">
`);

}

</script>

</body>
</html>
