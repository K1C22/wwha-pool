<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNHL | Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Aptos:wght@400;700&display=swap');
        
        :root { --pnhl-orange: #fc723f; --pnhl-bg: #f8f9fa; }
        * { font-family: 'Aptos', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: var(--pnhl-bg); color: #333; }

        /* HEADER */
        .header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--pnhl-orange); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; font-size: 1.4rem; }
        .status-tag { font-size: 0.75rem; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .status-online { background: #e6ffed; color: #28a745; }
        .status-offline { background: #fff1f0; color: #cf1322; }

        /* NAVIGATION */
        .nav-tabs { display: flex; justify-content: center; padding: 20px; gap: 10px; }
        .tab-btn { padding: 12px 35px; background: #e0e0e0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; flex: 0 1 250px; }
        .tab-btn.active { background: var(--pnhl-orange); color: white; }

        /* CONTENT */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .search-bar { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; font-size: 1rem; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }

        .data-card { background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; min-height: 400px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fcfcfc; padding: 15px; text-align: left; font-size: 0.8rem; color: #888; text-transform: uppercase; border-bottom: 2px solid #eee; }
        td { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; }
        tr:hover { background: #fffaf9; }

        .player-info { display: flex; align-items: center; gap: 10px; }
        .team-logo { width: 24px; height: 24px; object-fit: contain; }
        .pts-value { font-weight: bold; color: var(--pnhl-orange); text-align: center; }
        
        /* ERRORS & LOADING */
        .msg-box { padding: 60px; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--pnhl-orange); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn-retry { margin-top: 15px; padding: 10px 20px; background: var(--pnhl-orange); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>PNHL <span style="font-weight:normal; color:#bbb;">| Admin</span></h1>
    <div id="apiStatus" class="status-tag status-offline">Vérification...</div>
</div>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="switchMode('skaters', this)">Attaquants / Défenseurs</button>
    <button class="tab-btn" onclick="switchMode('goalies', this)">Gardiens</button>
</div>

<div class="container">
    <input type="text" id="searchInput" class="search-bar" placeholder="Rechercher par nom ou équipe..." onkeyup="filterPlayers()">
    
    <div class="data-card" id="mainDisplay">
        <div class="msg-box">
            <div class="loader"></div>
            <p>Connexion sécurisée aux serveurs NHL...</p>
        </div>
    </div>
</div>

<script>
    let playersData = [];
    let currentCategory = 'skaters';

    // Technique robuste : On utilise AllOrigins mais via l'API de récupération d'objet
    async function fetchNHLData() {
        const display = document.getElementById('mainDisplay');
        const status = document.getElementById('apiStatus');
        const endpoint = (currentCategory === 'skaters') 
            ? "https://api-web.nhle.com/v1/skater-stats-now" 
            : "https://api-web.nhle.com/v1/goalie-stats-now";

        try {
            // AllOrigins nous permet de récupérer le contenu même si CORS est bloqué
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(endpoint)}`);
            if (!response.ok) throw new Error();
            
            const wrapper = await response.json();
            const rawData = JSON.parse(wrapper.contents);
            playersData = rawData.data;

            // Tri automatique
            if(currentCategory === 'skaters') playersData.sort((a,b) => b.points - a.points);
            else playersData.sort((a,b) => b.wins - a.wins);

            status.textContent = "● API NHL Connectée";
            status.className = "status-tag status-online";
            renderTable(playersData.slice(0, 100));

        } catch (err) {
            status.textContent = "○ Erreur de connexion";
            status.className = "status-tag status-offline";
            display.innerHTML = `
                <div class="msg-box">
                    <h3 style="color:#cf1322;">Accès refusé par GitHub Pages</h3>
                    <p>La sécurité de votre navigateur bloque l'appel direct. <br> 
                    Pour corriger cela, essayez de rafraîchir ou vérifiez votre connexion.</p>
                    <button class="btn-retry" onclick="fetchNHLData()">Réessayer la connexion</button>
                </div>`;
        }
    }

    function renderTable(data) {
        const display = document.getElementById('mainDisplay');
        let html = `<table><thead><tr><th>Joueur</th><th>Équipe</th>`;
        
        if (currentCategory === 'skaters') {
            html += `<th>PJ</th><th>B</th><th>A</th><th style="text-align:center">PTS</th><th>+/-</th></tr></thead><tbody>`;
            data.forEach(p => {
                html += `<tr>
                    <td><div class="player-info">
                        <img class="team-logo" src="https://assets.nhle.com/mktg/utils/logos/teams-dark/${p.teamAbbrev}.svg" onerror="this.src='https://placehold.co/24?text=?'">
                        <b>${p.firstName} ${p.lastName}</b> <span style="font-size:0.7rem; color:#999;">${p.positionCode}</span>
                    </div></td>
                    <td>${p.teamAbbrev}</td>
                    <td>${p.gamesPlayed}</td><td>${p.goals}</td><td>${p.assists}</td>
                    <td class="pts-value">${p.points}</td>
                    <td style="color:${p.plusMinus < 0 ? '#cf1322' : '#28a745'}">${p.plusMinus > 0 ? '+' : ''}${p.plusMinus}</td>
                </tr>`;
            });
        } else {
            html += `<th>PJ</th><th>V</th><th>D</th><th>MOY</th><th>%ARR</th></tr></thead><tbody>`;
            data.forEach(p => {
                html += `<tr>
                    <td><div class="player-info">
                        <img class="team-logo" src="https://assets.nhle.com/mktg/utils/logos/teams-dark/${p.teamAbbrev}.svg">
                        <b>${p.firstName} ${p.lastName}</b>
                    </div></td>
                    <td>${p.teamAbbrev}</td>
                    <td>${p.gamesPlayed}</td><td>${p.wins}</td><td>${p.losses}</td>
                    <td style="font-weight:bold">${p.goalsAgainstAvg.toFixed(2)}</td>
                    <td>${(p.savePctg * 100).toFixed(1)}%</td>
                </tr>`;
            });
        }
        
        display.innerHTML = html + "</tbody></table>";
    }

    function filterPlayers() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = playersData.filter(p => 
            `${p.firstName} ${p.lastName} ${p.teamAbbrev}`.toLowerCase().includes(query)
        );
        renderTable(filtered.slice(0, 100));
    }

    function switchMode(mode, btn) {
        if (currentCategory === mode) return;
        currentCategory = mode;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('searchInput').value = "";
        fetchNHLData();
    }

    window.onload = fetchNHLData;
</script>

</body>
</html>
