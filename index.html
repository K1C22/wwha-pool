<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PNHL</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Aptos:ital,wght@0,400;1,400&display=swap');

*{
    font-family:'Aptos', sans-serif;
    box-sizing: border-box;
}

body{
    margin:0;
    background:#FFFFFF;
}

/* LOGIN */
#loginPage{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.login-container{
    background:#FFFFFF;
    padding:20px;
    width:360px;
    border-radius:2px;
    box-shadow:0 10px 15px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
    align-items:center;
}

.logo{
    width:300px;
    margin-bottom:50px;
}

input[type="text"], 
input[type="password"]{
    width:60%;
    padding:12px;
    border-radius:2px;
    border:2px solid #F5F5F5;
    margin-bottom:20px;
    box-shadow:0 4px 4px rgba(0,0,0,0.15);
}

/* CENTRAGE PARFAIT CHECKBOX */
.remember-container {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    gap: 8px;
    margin-bottom: 20px;
    cursor: pointer;
}

.remember-container input[type="checkbox"] {
    width: 16px;
    height: 16px;
    margin: 0;
    cursor: pointer;
}

.remember-container span {
    font-size: 10pt;
    color: #333;
}

button {
    background: #fc723f;
    color: #000000;
    border: none;
    padding: 10px 25px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 10pt;
    font-weight: bold;
    box-shadow:0 4px 4px rgba(0,0,0,0.15);
}

/* APP */
#app{ display:none; }

.header{
    background:#FFFFFF;
    padding:10px 20px;
    display:flex;
    flex-direction:column;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.header-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{ margin:0; font-size:20pt; font-weight:bold; }

#usernameDisplay{ font-size:12pt; font-weight:bold; }

#logoutBtn{
    background:#F5F5F5;
    border:1px solid #F5F5F5;
    padding:6px 12px;
    border-radius:2px;
    cursor:pointer;
}

.navbar-container{
    background:#FFFFFF;
    padding:10px 20px;
}

.navbar{
    background:#F0F0F0;
    display:flex;
    gap:6px;
    padding:4px;
}

.navbar div{
    flex:1;
    text-align:center;
    padding:10px;
    cursor:pointer;
    font-weight:bold;
}

.navbar div.active, .navbar div:hover{ background:#fc723f; }

.subnav{
    margin-top:0;
    display:flex;
    gap:6px;
    background:#F0F0F0;
    padding:4px;
}

.subnav div{
    cursor:pointer;
    flex:1;
    text-align:center;
    padding:10px 0;
    color:#333333;
    font-weight:bold;
}

.subnav div.active{ background:#fc723f; }

.content{ padding:20px; }

table { width: 100%; border-collapse: collapse; }
th { background: #f8f8f8; padding: 10px; text-align: left; border-bottom: 2px solid #fc723f; }
td { padding: 8px; border-bottom: 1px solid #eee; }
</style>
</head>
<body>

<div id="loginPage">
    <div class="login-container">
        <img src="https://raw.githubusercontent.com/K1C22/wwha-pool/main/WWHA13b.png" class="logo">
        <input type="text" placeholder="Identifiant" id="usernameInput">
        <input type="password" placeholder="Mot de passe">

        <label class="remember-container">
            <input type="checkbox" id="rememberMe">
            <span>Se souvenir de moi</span>
        </label>

        <button onclick="login()">Connexion</button>
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="header-top">
            <h1>PNHL</h1>
            <button id="logoutBtn" onclick="logout()">Déconnexion</button>
        </div>
        <div id="usernameDisplay"></div>
    </div>

    <div class="navbar-container">
        <div class="navbar">
            <div onclick="show('vestiaire')">Vestiaire</div>
            <div onclick="show('classement')">Classement</div>
            <div onclick="show('recrutement')">Recrutement</div>
            <div onclick="show('reglements')">Règlements</div>
            <div onclick="show('histoire')">Histoire</div>
        </div>
    </div>

    <div class="content" id="content"></div>
</div>

<script>
function login(){
    const username = document.getElementById("usernameInput").value;
    const remember = document.getElementById("rememberMe").checked;
    if(username.trim()===""){ alert("Veuillez entrer un identifiant."); return; }
    if(remember){ localStorage.setItem("pnhl_user", username); } 
    else { localStorage.removeItem("pnhl_user"); }
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("usernameDisplay").textContent = username;
    show('vestiaire');
}

function logout(){
    document.getElementById("app").style.display="none";
    document.getElementById("loginPage").style.display="flex";
    localStorage.removeItem("pnhl_user");
}

window.onload=function(){
    const saved=localStorage.getItem("pnhl_user");
    if(saved){
        document.getElementById("usernameInput").value=saved;
        document.getElementById("rememberMe").checked=true;
        login();
    }
};

function show(page){
    const tabs=document.querySelectorAll(".navbar div");
    tabs.forEach(t=>t.classList.remove("active"));
    const active=Array.from(tabs).find(t=>t.textContent.toLowerCase().includes(page));
    if(active) active.classList.add("active");

    document.getElementById("content").innerHTML=`
        <div class="subnav" id="subnav"></div>
        <div id="subcontent" style="margin-top:10px;"></div>
    `;

    const subnav=document.getElementById("subnav");
    if(page==="vestiaire"){
        subnav.innerHTML=`<div onclick="sub('chambre')">Chambre</div><div onclick="sub('contrats')">Contrats</div>`;
    } else if(page==="recrutement"){
        subnav.innerHTML=`<div onclick="sub('echange')">Échange</div><div onclick="sub('joueur')">Joueur autonome</div>`;
    }
}

function sub(type){
    const subs=document.querySelectorAll(".subnav div");
    subs.forEach(s=>s.classList.remove("active"));
    const clicked=Array.from(subs).find(s=>s.textContent.toLowerCase().includes(type));
    if(clicked) clicked.classList.add("active");

    if(type==="joueur") loadNHLPlayers();
    else document.getElementById("subcontent").innerHTML = "";
}

async function loadNHLPlayers(){
    const content = document.getElementById("subcontent");
    content.innerHTML = "Récupération des données NHL...";
    
    // URL optimisée pour éviter les erreurs de structure
    const url = "https://api.nhle.com/stats/rest/en/skater/summary?isAggregate=false&isGame=false&sort=%5B%7B%22property%22%3A%22points%22%2C%22direction%22%3A%22DESC%22%7D%5D&start=0&limit=50&cayenneExp=gameTypeId=2%20and%20seasonId%3C=20252026%20and%20seasonId%3E=20252026";

    try {
        const res = await fetch(url);
        if(!res.ok) throw new Error();
        const json = await res.json();
        
        let html = `<table><tr><th>Nom</th><th>Équipe</th><th>PJ</th><th>B</th><th>A</th><th>PTS</th></tr>`;
        json.data.forEach(p => {
            html += `<tr>
                <td style="font-weight:bold;">${p.skaterFullName}</td>
                <td>${p.teamAbbrevs}</td>
                <td style="text-align:center;">${p.gamesPlayed}</td>
                <td style="text-align:center;">${p.goals}</td>
                <td style="text-align:center;">${p.assists}</td>
                <td style="font-weight:bold; color:#fc723f; text-align:center;">${p.points}</td>
            </tr>`;
        });
        html += `</table>`;
        content.innerHTML = html;
    } catch(e) {
        content.innerHTML = "<div style='color:red;'>Erreur de chargement. Si vous testez sur Replit, assurez-vous d'utiliser l'adresse en HTTPS.</div>";
    }
}
</script>

</body>
</html>
