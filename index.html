<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PNHL</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Aptos:ital,wght@0,400;1,400&display=swap');

*{
    font-family:'Aptos', sans-serif;
    box-sizing: border-box;
}

body{
    margin:0;
    background:#FFFFFF;
}

/* LOGIN */
#loginPage{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.login-container{
    background:#FFFFFF;
    padding:20px;
    width:360px;
    border-radius:2px;
    box-shadow:0 10px 15px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
    align-items:center;
}

.logo{
    width:300px;
    margin-bottom:50px;
}

input{
    width:60%;
    padding:12px;
    border-radius:2px;
    border:2px solid #F5F5F5;
    margin-bottom:20px;
    box-shadow:0 4px 4px rgba(0,0,0,0.15);
}

/* FIX CHECKBOX */
label{
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:20px;
    width:60%;
}

input[type="checkbox"]{
    width:auto;
    margin:0;
    padding:0;
    box-shadow:none;
    transform: scale(1.1);
}

button {
    background: #fc723f;
    color: #000000;
    border: none;
    padding: 8px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 10pt;
    font-weight: bold;
    box-shadow:0 4px 4px rgba(0,0,0,0.15);
}

/* APP */
#app{
    display:none;
}

/* HEADER */
.header{
    background:#FFFFFF;
    padding:10px 20px;
    display:flex;
    flex-direction:column;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.header-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    margin:0;
    font-size:20pt;
    font-weight:bold;
}

#usernameDisplay{
    font-size:12pt;
    font-weight:bold;
}

#logoutBtn{
    background:#F5F5F5;
    border:1px solid #F5F5F5;
    padding:6px 12px;
    border-radius:2px;
    cursor:pointer;
}

/* NAVBAR */
.navbar-container{
    background:#FFFFFF;
    padding:10px 20px;
}

.navbar{
    background:#F0F0F0;
    display:flex;
    gap:6px;
    padding:4px;
}

.navbar div{
    flex:1;
    text-align:center;
    padding:10px;
    cursor:pointer;
    font-weight:bold;
}

.navbar div.active,
.navbar div:hover{
    background:#fc723f;
}

/* SUBNAV */
.subnav{
    margin-top:0;
    display:flex;
    gap:6px;
    background:#F0F0F0;
    padding:4px;
}

.subnav div{
    cursor:pointer;
    flex:1;
    text-align:center;
    padding:10px 0;
    color:#333333;
    font-weight:bold;
    transition: all 0.2s;
}

.subnav div:hover,
.subnav div.active{
    background:#fc723f;
    color:#000000;
}

.content{
    padding:20px;
}

/* TABLE STYLES */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
th {
    background: #F0F0F0;
    padding: 10px;
    text-align: left;
    border-bottom: 2px solid #ccc;
}
td {
    padding: 8px;
    border-bottom: 1px solid #eee;
}
</style>
</head>
<body>

<div id="loginPage">
    <div class="login-container">
        <img src="https://raw.githubusercontent.com/K1C22/wwha-pool/main/WWHA13b.png" class="logo">
        <input type="text" placeholder="Identifiant" id="usernameInput">
        <input type="password" placeholder="Mot de passe">

        <label>
            <input type="checkbox" id="rememberMe"> Se souvenir de moi
        </label>

        <button onclick="login()">Connexion</button>
    </div>
</div>

<div id="app">

    <div class="header">
        <div class="header-top">
            <h1>PNHL</h1>
            <button id="logoutBtn" onclick="logout()">Déconnexion</button>
        </div>
        <div id="usernameDisplay"></div>
    </div>

    <div class="navbar-container">
        <div class="navbar">
            <div onclick="show('vestiaire')">Vestiaire</div>
            <div onclick="show('classement')">Classement</div>
            <div onclick="show('recrutement')">Recrutement</div>
            <div onclick="show('reglements')">Règlements</div>
            <div onclick="show('histoire')">Histoire</div>
        </div>
    </div>

    <div class="content" id="content"></div>
</div>

<script>

function login(){
    const username = document.getElementById("usernameInput").value;
    const remember = document.getElementById("rememberMe").checked;

    if(username.trim()===""){ alert("Veuillez entrer un identifiant."); return; }

    if(remember){
        localStorage.setItem("pnhl_user", username);
    } else {
        localStorage.removeItem("pnhl_user");
    }

    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("usernameDisplay").textContent=username;
    show('vestiaire');
}

function logout(){
    document.getElementById("app").style.display="none";
    document.getElementById("loginPage").style.display="flex";
    localStorage.removeItem("pnhl_user");
}

window.onload=function(){
    const saved=localStorage.getItem("pnhl_user");
    if(saved){
        document.getElementById("usernameInput").value=saved;
        document.getElementById("rememberMe").checked=true;
        login();
    }
};

function show(page){
    const tabs=document.querySelectorAll(".navbar div");
    tabs.forEach(t=>t.classList.remove("active"));
    const active=Array.from(tabs).find(t=>t.textContent.toLowerCase()===page);
    if(active) active.classList.add("active");

    document.getElementById("content").innerHTML=`
        <div class="subnav" id="subnav"></div>
        <div id="subcontent" style="margin-top:10px;"></div>
    `;

    const subnav=document.getElementById("subnav");

    if(page==="vestiaire"){
        subnav.innerHTML=`
            <div onclick="sub('chambre')">Chambre</div>
            <div onclick="sub('contrats')">Contrats</div>
        `;
    }

    if(page==="classement"){
        subnav.innerHTML=`<div onclick="sub('general')">Général</div>`;
    }

    if(page==="recrutement"){
        subnav.innerHTML=`
            <div onclick="sub('echange')">Échange</div>
            <div onclick="sub('joueur')">Joueur autonome</div>
        `;
    }

    if(page==="reglements"){
        subnav.innerHTML=`
            <div onclick="sub('regles')">Règles</div>
            <div onclick="sub('modif')">Modifications</div>
        `;
    }

    if(page==="histoire"){
        subnav.innerHTML=`
            <div onclick="sub('draft')">Draft</div>
            <div onclick="sub('ligue')">Ligue</div>
            <div onclick="sub('franchises')">Franchises</div>
        `;
    }
}

function sub(type){
    const subs=document.querySelectorAll(".subnav div");
    subs.forEach(s=>s.classList.remove("active"));

    const clicked=Array.from(subs).find(s=>s.textContent.toLowerCase().includes(type));
    if(clicked) clicked.classList.add("active");

    if(type==="joueur"){
        loadNHLPlayers();
        return;
    }

    document.getElementById("subcontent").innerHTML="";
}

/* NHL API FETCH */
async function loadNHLPlayers(){
    document.getElementById("subcontent").innerHTML = "Chargement des données NHL...";
    
    // API officielle pour les meneurs de points actuels
    const url = "https://api-web.nhle.com/v1/skater-stats-leaders/current?categories=points&limit=100";

    try{
        const res = await fetch(url);
        if(!res.ok) throw new Error();

        const data = await res.json();
        const players = data.points;

        if(!players || players.length === 0){
            document.getElementById("subcontent").innerHTML = "Aucune donnée NHL disponible.";
            return;
        }

        let html = `
        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Équipe</th>
                    <th style="text-align:center;">PJ</th>
                    <th style="text-align:center;">B</th>
                    <th style="text-align:center;">A</th>
                    <th style="text-align:center; background:#ffe8df;">PTS</th>
                </tr>
            </thead>
            <tbody>
        `;

        players.forEach(p => {
            // Reconstitution du nom complet depuis l'objet API
            const fullName = `${p.firstName.default} ${p.lastName.default}`;
            
            html += `
            <tr>
                <td style="font-weight:500;">${fullName}</td>
                <td>${p.teamAbbrev}</td>
                <td style="text-align:center;">${p.gamesPlayed}</td>
                <td style="text-align:center;">${p.goals}</td>
                <td style="text-align:center;">${p.assists}</td>
                <td style="text-align:center; font-weight:bold; background:#fff5f2;">${p.value}</td>
            </tr>
            `;
        });

        html += `</tbody></table>`;
        document.getElementById("subcontent").innerHTML = html;

    } catch(e) {
        console.error(e);
        document.getElementById("subcontent").innerHTML = 
        "<div style='color:red;'>Impossible de charger les joueurs NHL. L'API est peut-être temporairement indisponible.</div>";
    }
}

</script>

</body>
</html>
