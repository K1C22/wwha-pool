<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WWHA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Aptos:ital,wght@0,400;1,400&display=swap');

*{
    font-family:'Aptos', sans-serif;
}

body{
    margin:0;
    background:#efefef;
}

/* LOGIN */
#loginPage{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.login-container{
    background:white;
    padding:40px;
    width:360px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
}

.logo{
    width:150px;
    margin:auto;
    margin-bottom:25px;
    opacity:0.35;
}

input{
    padding:12px;
    border-radius:8px;
    border:2px solid #222;
    margin-bottom:10px;
}

button{
    background:#1f5cc4;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
}

/* APP */
#app{
    display:none;
}

.navbar{
    background:#1f5cc4;
    padding:15px;
    display:flex;
    gap:20px;
    align-items:center;
}

.navbar div{
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.content{
    padding:20px;
}

/* sous onglets */
.subnav{
    margin-top:10px;
    display:flex;
    gap:15px;
}

.subnav div{
    cursor:pointer;
    padding:6px 10px;
    background:#ddd;
    border-radius:6px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-container">
        <img src="WWHA13b.png" class="logo">
        <input type="text" placeholder="Identifiant">
        <input type="password" placeholder="Mot de passe">
        <button onclick="login()">CONNEXION</button>
    </div>
</div>

<!-- APP -->
<div id="app">

    <div class="navbar">
        <div onclick="show('vestiaire')">Vestiaire</div>
        <div onclick="show('classement')">Classement</div>
        <div onclick="show('recrutement')">Recrutement</div>
        <div onclick="show('reglements')">Règlements</div>
        <div onclick="show('histoire')">Histoire</div>
    </div>

    <div class="content" id="content"></div>

</div>

<script>

/* UTILISATEURS */
const users = [
    {username:"Charles", password:"4444"},
    {username:"Admin", password:"1234"}
];

/* AUTO LOGIN */
window.onload = function(){
    let savedUser = localStorage.getItem("user");
    if(savedUser){
        enterApp(savedUser);
    }
};

/* LOGIN */
function login(){

    let user = document.querySelector("input[type='text']").value;
    let pass = document.querySelector("input[type='password']").value;

    let found = users.find(u => u.username === user && u.password === pass);

    if(found){
        localStorage.setItem("user", user);
        enterApp(user);
    } else {
        alert("Identifiant ou mot de passe incorrect");
    }
}

/* ENTRER DANS LE SITE */
function enterApp(user){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";

    // afficher le nom connecté + déconnexion
    if(!document.querySelector(".navbar .user")) {
        let userDiv = document.createElement("div");
        userDiv.className="user";
        userDiv.style.marginLeft="auto";
        userDiv.innerHTML = `👤 ${user} | <span style="cursor:pointer;" onclick="logout()">Déconnexion</span>`;
        document.querySelector(".navbar").appendChild(userDiv);
    }

    show('vestiaire');
}

/* LOGOUT */
function logout(){
    localStorage.removeItem("user");
    location.reload();
}

/* NAVIGATION PRINCIPALE */
function show(page){

    let html = "";

    if(page==="vestiaire"){
        html = `
        <h2>Vestiaire</h2>
        <div class="subnav">
            <div onclick="sub('chambre')">Chambre</div>
            <div onclick="sub('contrats')">Contrats</div>
        </div>
        <div id="subcontent">Choisir un onglet</div>`;
    }

    if(page==="classement"){
        html = `<h2>Classement</h2>`;
    }

    if(page==="recrutement"){
        html = `
        <h2>Recrutement</h2>
        <div class="subnav">
            <div onclick="sub('echange')">Échange</div>
            <div onclick="sub('joueur')">Joueur autonome</div>
        </div>
        <div id="subcontent"></div>`;
    }

    if(page==="reglements"){
        html = `
        <h2>Règlements</h2>
        <div class="subnav">
            <div onclick="sub('regles')">Règles</div>
            <div onclick="sub('modif')">Modifications</div>
        </div>
        <div id="subcontent"></div>`;
    }

    if(page==="histoire"){
        html = `
        <h2>Histoire</h2>
        <div class="subnav">
            <div onclick="sub('draft')">Draft</div>
            <div onclick="sub('ligue')">Ligue</div>
            <div onclick="sub('franchises')">Franchises</div>
        </div>
        <div id="subcontent"></div>`;
    }

    document.getElementById("content").innerHTML = html;
}

/* SOUS-ONGLETS */
function sub(type){

    let content = "";

    if(type==="chambre") content="Contenu Chambre";
    if(type==="contrats") content="Contenu Contrats";
    if(type==="echange") content="Contenu Échange";
    if(type==="joueur") content="Joueurs autonomes";
    if(type==="regles") content="Liste des règles";
    if(type==="modif") content="Modifications";
    if(type==="draft") content="Draft";
    if(type==="ligue") content="Ligue";
    if(type==="franchises") content="Franchises";

    document.getElementById("subcontent").innerHTML = content;
}

</script>

</body>
</html>
